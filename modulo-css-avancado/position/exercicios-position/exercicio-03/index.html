<!-- DESAFIO 03 -->
<!-- Objetivo: posicionar o h1 usando a página (documento) como referência principal. -->
<!-- Requisito exato: o h1 deve ficar a 50px do topo da página HTML. -->
<!-- Solução esperada: usar position: absolute com top: 50px.
  Como não existe ancestral posicionado, a referência vira a página. -->

<!DOCTYPE html>
<html>
  <head>
    <title>CSS Position - Exercício 03</title>

    <style>
      h1 {
        position: absolute; /* Sai do fluxo normal e usa o bloco de referência absoluto */
        top: 50px; /* Distância de 50px do topo da página/referência atual */
      }
    </style>
  </head>
  <body>
    <h1>Me posicione!</h1>
  </body>
</html>
