<!-- DESAFIO 01 -->
<!-- Objetivo: deixar o h1 sempre no mesmo lugar da tela do usuário (viewport),
     independentemente de rolagem da página. -->
<!-- Requisito exato: 50px do topo da tela e 10px da lateral esquerda da tela. -->
<!-- Solução esperada: usar position: fixed, porque fixed usa a viewport como referência. -->

<!DOCTYPE html>
<html>
  <head>
    <title>CSS Position - Exercício 01</title>

    <style>
      h1 {
        position: fixed; /* Mantém fixo na tela, mesmo ao rolar */
        top: 50px;       /* Distância de 50px em relação ao topo da viewport */
        left: 10px;      /* Distância de 10px em relação à esquerda da viewport */
      }
    </style>
  </head>
  <body>
    <h1>Me posicione!</h1>
  </body>
</html>
