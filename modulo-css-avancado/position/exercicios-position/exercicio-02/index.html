<!-- DESAFIO 02 -->
<!-- Objetivo: mover o h1 para baixo sem tirá-lo completamente do fluxo normal da página. -->
<!-- Requisito exato: o h1 deve ficar 100px abaixo da sua posição original (normal). -->
<!-- Solução esperada: usar position: relative com top: 100px,
     pois relative desloca o elemento com base na própria posição inicial. -->

<!DOCTYPE html>
<html>
  <head>
    <title>CSS Position - Exercício 02</title>

    <style>
      h1 {
        position: relative; /* Mantém referência na posição original do próprio h1 */
        top: 100px; /* Desloca 100px para baixo em relação ao ponto onde ele estaria */
      }
    </style>
  </head>
  <body>
    <h1>Me posicione!</h1>
  </body>
</html>
