<!-- DESAFIO 04 -->
<!-- Objetivo: fazer o h1 usar o pai mais próximo como referência de posicionamento. -->
<!-- Requisito exato: o h1 deve ficar 50px do topo do elemento pai posicionado. -->
<!-- Solução esperada: definir o pai (div) com position: relative,
     e o h1 com position: absolute + top: 50px. -->

<!DOCTYPE html>
<html>
  <head>
    <title>CSS Position - Exercício 04</title>

    <style>
      div {
        position: relative; /* Cria o contexto de referência para o filho absoluto */
      }

      h1 {
        position: absolute; /* Passa a se posicionar em relação ao div (pai posicionado) */
        top: 50px; /* Fica 50px abaixo do topo do div */
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Me posicione!</h1>
    </div>
  </body>
</html>
