<!DOCTYPE html>
<html>
  <head>
    <title>Grid: Desafio 02</title>

    <style>
      body {
        background-color: #fff;
        color: #333;
        font-size: 1.2rem;
        font-family: Arial, Helvetica, sans-serif;
        padding: 1rem;
        margin: 0;
      }

      .grid > div {
        background-color: #4d7298;
        border: 2px solid #77a6b6;
        border-radius: 0.5rem;
        color: #fff;
        padding: 0.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 10px;
        grid-template-areas: 
        "one one"
        "two three"
        "four four";
     }
     .one {
       grid-area: one;
     }
     .two {
      grid-area: two;
    }
    .three {
      grid-area: three;
    }
    .four {
      grid-area: four;
    }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="one">One</div>
      <div class="two">Two</div>
      <div class="three">Three</div>
      <div class="four">Four</div>
    </div>
  </body>
</html>
