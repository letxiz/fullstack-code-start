<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabela</title>
</head>
<body>
  <table border="1">
    <thead>
      <tr>
        <th>Nome</th>
        <th>E-mail</th>
        <th>Idade</th>
      </tr>
    </thead>
    
    <tbody>
      <tr>
        <td>João</td>
        <td>joao@example.com</td>
        <td>25</td>
      </tr>

      <tr>
        <td>Maria</td>
        <td>maria@example.com</td>
        <td>30</td>
      </tr>
    </tbody>
    
  </table>
  
</body>
</html>
